<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Sign Up</title>
</head>
<body>
    <main>
        <div id="img-holder">
            <img src="./greenScenery.jpg" alt="" id="bg-img">
            <div id="bar">
                <img src="./odin-lined.png" alt="">
                <p>ODIN</p>
            </div>
        </div>
        <div id="form-holder">
            <div id="description">
                <p>This is not a real online service!!!You know you need something like this in your life to help you realize your deepest dreams. <br>Sign up <em>now</em> to get started.</p>
                <p>You <em>know</em> you want.</p>
            </div>
            <form action="">
                <fieldset id="info-holder">
                    <legend>Let's do this!</legend>
                    <div>
                        <!-- wrapped pairs -->
                        <div class="field">
                            <label for="f-name">First Name</label>
                            <input type="text" id="f-name" name="first-name" minlength="3" maxlength="50" required placeholder="Enter your first name">
                        </div>
                        <div class="field">
                            <label for="l-name">Last Name</label>
                            <input type="text" id="l-name" name="last-name" minlength="3" maxlength="50" required placeholder="Enter your last name">
                        </div>
                    </div>
                    <div>
                        <div class="field">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required placeholder="Enter your email address">
                        </div>
                        <div class="field">
                            <label for="phone">Phone Number</label>
                            <input type="text"  id="phone" name="phone-number" required placeholder="+(XXX) XXX-XXXX" pattern="^[+]*[(]{0,1}[0-9]{1,4}[)]{0,1}[-\s\./0-9]*$" title="Please enter a valid phone number in the format +(XXX) XXX-XXXX">
                        </div>
                    </div>
                    <div>
                        <div class="field">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" required pattern="^(?=.*?[A-Z])(?=.*?[a-z])(?=.*?[0-9])(?=.*?[#?!@$ %^&*-]).{8,}$" title="Password must be at least 8 characters long and include at least one uppercase letter, one lowercase letter, one number, and one special character.">
                        </div>
                        <div class="field">
                            <label for="confirm-password">Confirm Password</label>
                            <input type="password" id="confirm-password" name="confirm-password" required pattern="^(?=.*?[A-Z])(?=.*?[a-z])(?=.*?[0-9])(?=.*?[#?!@$ %^&*-]).{8,}$" title="Password must be at least 8 characters long and include at least one uppercase letter, one lowercase letter, one number, and one special character.">
                        </div>
                    </div>
                </fieldset>
                <button type="submit">Create Account</button>
            </form>
            <p>Already have an account? <a href="#">Log in</a></p>
        </div>
    </main>
</body>
</html>
